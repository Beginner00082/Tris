<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tris Neon Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scanline"></div>
  <div class="container">
    <h1>TRIS NEON</h1>

    <div class="controls">
      <select id="difficulty">
        <option value="facile">Facile - Bot scarso</option>
        <option value="medio" selected>Medio - Bot normale</option>
        <option value="difficile">Difficile - Bot forte</option>
        <option value="impossibile">Impossibile - Non vinci mai</option>
      </select>
    </div>

    <p id="status">Tocca a te - Blu ⚡</p>
    <div class="board" id="board"></div>
    <button id="reset">Ricomincia</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
